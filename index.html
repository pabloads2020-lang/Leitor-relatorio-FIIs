<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Relatórios · FIIs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0e1117; color: #e8eaf0; padding: 2rem; max-width: 1000px; margin: 0 auto; }
.card { background: #161b25; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.btn { background: #f5c842; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn:hover { background: #e0a800; }
.file-label { background: #1c2333; padding: 10px 15px; border-radius: 8px; cursor: pointer; display: inline-block; border: 1px dashed #555; }
.file-label:hover { border-color: #f5c842; color: #f5c842; }
pre { background: #1c2333; padding: 1rem; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px; line-height: 1.5; }
.info-titulo { color: #f5c842; font-weight: bold; margin-top: 0.5rem; margin-bottom: 0.25rem; }
hr { border-color: #2a2a3a; margin: 0.5rem 0; }
</style>
</head>
<body>

<div class="card">
  <h2>📄 Leitor de Relatórios Gerenciais - FIIs</h2>
  <p style="color:#aaa; margin: 10px 0;">Busca por: Vacância | Receita Total | Despesa Total | Comentário do Gestor | Revisão/Reajuste | Prazo Médio (WAULT) | Inadimplência</p>
  <label class="file-label" for="filePdf">📁 Selecionar PDF</label>
  <input type="file" id="filePdf" accept=".pdf" style="display:none">
  <button class="btn" id="btnExtrair" style="margin-left: 10px;">🔍 Extrair informações</button>
  <div id="status" style="margin-top: 10px; color: #aaa;"></div>
</div>

<div class="card" id="resultado" style="display:none">
  <h3>📋 INFORMAÇÕES EXTRAÍDAS</h3>
  <pre id="textoResultado"></pre>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

document.getElementById('filePdf').addEventListener('change', function(e) {
  document.getElementById('status').innerHTML = `📄 Arquivo: ${e.target.files[0]?.name}`;
});

document.getElementById('btnExtrair').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  if (!file) { alert("Selecione um PDF primeiro"); return; }
  
  document.getElementById('status').innerHTML = "⏳ Processando PDF...";
  document.getElementById('resultado').style.display = 'none';
  
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  
  let textoCompleto = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    textoCompleto += content.items.map(item => item.str).join(' ') + '\n';
  }
  
  // Normaliza o texto (remove quebras e espaços extras)
  const texto = textoCompleto.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
  
  const resultados = [];
  
  // ==================== 1. VACÂNCIA ====================
  let vacMatch = texto.match(/vac[âa]ncia\s*(?:f[íi]sica)?\s*[:\-]?\s*(\d+(?:[.,]\d+)?\s*%)/i);
  if (!vacMatch) vacMatch = texto.match(/vac[âa]ncia\s+do\s+Fundo\s+(?:encerrou|ficou)\s+em\s+(\d+(?:[.,]\d+)?\s*%)/i);
  if (!vacMatch) vacMatch = texto.match(/Vac[âa]ncia\s*Fisica\*?\s*(\d+(?:[.,]\d+)?\s*%)/i);
  if (vacMatch) resultados.push(`📊 VACÂNCIA: ${vacMatch[1]}`);
  else resultados.push(`📊 VACÂNCIA: Não encontrado`);
  
  // ==================== 2. RECEITA TOTAL DO MÊS ====================
  let recMatch = texto.match(/receita\s+total\s*[:\-]?\s*R?\$?\s*(\d+(?:[.,]\d+)?)\s*(?:\/cota|milh[õo]es?)?/i);
  if (!recMatch) recMatch = texto.match(/receita\s+total\s+de\s+R?\$?\s*(\d+(?:[.,]\d+)?)\s*(?:\/cota)?/i);
  if (!recMatch) recMatch = texto.match(/R\$?\s*(\d+(?:[.,]\d+)?)\s*(?:milh[õo]es?)?\s*de\s+receita/i);
  if (recMatch) resultados.push(`💰 RECEITA TOTAL: R$ ${recMatch[1].replace('.', ',')}`);
  else resultados.push(`💰 RECEITA TOTAL: Não encontrado`);
  
  // ==================== 3. DESPESA TOTAL ====================
  let despMatch = texto.match(/despesas?\s+totais?\s*[:\-]?\s*R?\$?\s*(\d+(?:[.,]\d+)?)\s*(?:\/cota|milh[õo]es?)?/i);
  if (!despMatch) despMatch = texto.match(/despesas?\s+totais?\s+de\s+R?\$?\s*(\d+(?:[.,]\d+)?)/i);
  if (despMatch) resultados.push(`📉 DESPESA TOTAL: R$ ${despMatch[1].replace('.', ',')}`);
  else resultados.push(`📉 DESPESA TOTAL: Não encontrado`);
  
  // ==================== 4. COMENTÁRIO DO GESTOR ====================
  let comMatch = texto.match(/Coment[áa]rios?\s+da\s+Gest[ãa]o[:\s]+([^\.]+\.\s*[^\.]+\.\s*[^\.]+\.\s*[^\.]+\.)/i);
  if (!comMatch) comMatch = texto.match(/Coment[áa]rios?\s+da\s+Gest[ãa]o\s*\([^)]+\)\s*([^■]+)/i);
  if (!comMatch) comMatch = texto.match(/Coment[áa]rios?\s+da\s+Gest[ãa]o[:\s]*([\s\S]{200,600})/i);
  if (comMatch) {
    let comentario = comMatch[1].trim().replace(/\s+/g, ' ');
    if (comentario.length > 500) comentario = comentario.substring(0, 500) + '...';
    resultados.push(`💬 COMENTÁRIO DO GESTOR:\n${comentario}`);
  } else resultados.push(`💬 COMENTÁRIO DO GESTOR: Não encontrado`);
  
  // ==================== 5. REVISÃO / REAJUSTE ====================
  let revMatch = texto.match(/reajustes?\s*(?:realizados?|programados?)\s*[:\-]?\s*([^.\n]+)/i);
  if (!revMatch) revMatch = texto.match(/revis[ãa]o\s*contratual[:\s]*([^.\n]+)/i);
  if (!revMatch && texto.match(/n[ãa]o\s+havia\s+reajustes/i)) {
    revMatch = ["não havia reajustes", "não havia reajustes"];
  }
  if (revMatch) resultados.push(`📅 REVISÃO/REAJUSTE: ${revMatch[1].trim()}`);
  else resultados.push(`📅 REVISÃO/REAJUSTE: Não encontrado`);
  
  // ==================== 6. PRAZO MÉDIO DOS CONTRATOS (WAULT) ====================
  let waultMatch = texto.match/(?:WAULT|WALT|prazo médio)\s*(?:ponderado|dos contratos)?\s*[:\-]?\s*(\d+(?:[.,]\d+)?\s*(?:anos?|meses?))/i);
  if (!waultMatch) waultMatch = texto.match(/prazo\s+médio\s+dos\s+contratos\s*[:\-]?\s*(\d+(?:[.,]\d+)?\s*(?:anos?|meses?))/i);
  if (!waultMatch) waultMatch = texto.match(/WALT\s*[:\-]?\s*(\d+(?:[.,]\d+)?)/i);
  if (waultMatch) resultados.push(`⏱️ PRAZO MÉDIO (WAULT): ${waultMatch[1]}`);
  else resultados.push(`⏱️ PRAZO MÉDIO (WAULT): Não encontrado`);
  
  // ==================== 7. INADIMPLÊNCIA ====================
  let inadMatch = texto.match(/inadimpl[êe]ncia\s*[:\-]?\s*R?\$?\s*([\d\.,]+)/i);
  if (!inadMatch) inadMatch = texto.match(/inadimpl[êe]ncia\s*[:\-]?\s*(\d+(?:[.,]\d+)?\s*%)/i);
  if (inadMatch) resultados.push(`⚠️ INADIMPLÊNCIA: ${inadMatch[1]}${inadMatch[1].match(/%/) ? '' : ' (R$)'}`);
  else resultados.push(`⚠️ INADIMPLÊNCIA: Não encontrado`);
  
  // ==================== INFORMAÇÕES ADICIONAIS ÚTEIS ====================
  resultados.push('', '--- INFORMAÇÕES ADICIONAIS ---', '');
  
  // Ticker do fundo
  const tickerMatch = texto.match(/\b([A-Z]{4}\d{2})\b/);
  if (tickerMatch) resultados.push(`🏷️ Ticker: ${tickerMatch[1]}`);
  
  // Gestora
  if (texto.match(/P[áa]tria/i)) resultados.push(`🏢 Gestora: Pátria Investimentos`);
  else if (texto.match(/BTG/i)) resultados.push(`🏢 Gestora: BTG Pactual`);
  else if (texto.match(/XP/i)) resultados.push(`🏢 Gestora: XP Asset`);
  
  // LTV (se tiver)
  const ltvMatch = texto.match(/LTV\s*[:\-]?\s*(\d+(?:[.,]\d+)?\s*%)/i);
  if (ltvMatch) resultados.push(`🏦 LTV: ${ltvMatch[1]}`);
  
  // Distribuição (se tiver)
  const distMatch = texto.match(/R\$\s*(\d+(?:[.,]\d+)?)\s*\/\s*cota/i);
  if (distMatch) resultados.push(`💰 Distribuição: R$ ${distMatch[1]}/cota`);
  
  // Exibe resultado
  const html = resultados.join('\n');
  document.getElementById('textoResultado').textContent = html;
  document.getElementById('resultado').style.display = 'block';
  document.getElementById('status').innerHTML = "✅ Extração concluída!";
});
</script>
</body>
</html>
