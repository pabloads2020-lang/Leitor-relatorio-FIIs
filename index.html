<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Relatórios Gerenciais · FIIs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
  --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.12);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --input-bg: #1c2333; --input-border: rgba(255,255,255,0.13);
  --debug-bg: #1c2333; --overlay-bg: rgba(14,17,23,.88);
  --footer-border: rgba(255,255,255,0.07);
  --result-item-bg: #1c2333;
}
body.light {
  --bg: #f5f7fa; --bg2: #ffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --green: #27ae60; --green-bg: rgba(39,174,96,0.1);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.1);
  --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1);
  --header-bg: #ffff; --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffff; --card-border: rgba(0,0,0,0.08);
  --input-bg: #ffff; --input-border: #e2e8f0;
  --debug-bg: #f7fafc; --overlay-bg: rgba(255,255,255,.95);
  --footer-border: rgba(0,0,0,0.08);
  --result-item-bg: #f7fafc;
}
* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
body { font-family: 'DM Sans', 'Atkinson Hyperlegible', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.header-date { font-size: 13px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.05); }

.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.card-title span { font-size: 11px; font-weight: 400; letter-spacing: 0; text-transform: none; }

.api-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.api-input-wrap { position: relative; flex: 1; min-width: 220px; }
.api-input { width: 100%; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: 8px; padding: 9px 40px 9px 14px; font-size: 14px; color: var(--text); font-family: monospace; outline: none; }
.api-input:focus { border-color: var(--gold); }
.api-input::placeholder { color: var(--text3); font-family: 'DM Sans', sans-serif; }
.api-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text3); font-size: 16px; background: none; border: none; }
.api-eye:hover { color: var(--gold); }
.btn-key { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); white-space: nowrap; text-decoration: none; }
.btn-key:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.08); }
.api-status { font-size: 12px; color: var(--text3); margin-top: 4px; }
.api-status.valid { color: var(--green); }
.api-status.invalid { color: var(--red); }

.upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.file-label { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; color: var(--text2); flex: 1; min-width: 180px; }
.file-label:hover { border-color: var(--gold); color: var(--gold); }
#filePdf { display: none; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; white-space: nowrap; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

.status { display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
.status.show { display: flex; }
.status-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46,204,113,0.25); }
.status-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(231,76,60,0.25); }
.status-warn { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(243,156,18,0.25); }

.resultados-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem; }
.result-card { background: var(--result-item-bg); border-radius: 10px; padding: 1rem; border: 1px solid var(--border); }
.result-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 8px; }
.result-value { font-size: 18px; font-weight: 700; font-family: 'Atkinson Hyperlegible', monospace; word-break: break-word; line-height: 1.3; }
.result-value.small { font-size: 14px; font-weight: 400; }

.semaphore-pill { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:18px; font-size:13px; font-weight:700; margin-top:10px; }
.semaphore-pill.green { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.18); }
.semaphore-pill.amber { background: rgba(243,156,18,0.10); color: var(--amber); border: 1px solid rgba(243,156,18,0.12); }
.semaphore-pill.red { background: rgba(231,76,60,0.10); color: var(--red); border: 1px solid rgba(231,76,60,0.12); }

.resumo-box { grid-column: 1 / -1; background: var(--result-item-bg); border-radius: 10px; padding: 1.25rem; border-left: 3px solid var(--blue); margin-top: 0.5rem; }
.resumo-texto { font-size: 14px; line-height: 1.7; color: var(--text2); margin-top: 8px; white-space: pre-wrap; }

.riscos-box { grid-column: 1 / -1; background: var(--result-item-bg); border-radius: 10px; padding: 1.25rem; border-left: 3px solid var(--red); margin-top: 0.5rem; }
.positivos-box { grid-column: 1 / -1; background: var(--result-item-bg); border-radius: 10px; padding: 1.25rem; border-left: 3px solid var(--green); margin-top: 0.5rem; }
.comentario-box { grid-column: 1 / -1; background: var(--result-item-bg); border-radius: 10px; padding: 1rem; border-left: 3px solid var(--gold); margin-top: 0.5rem; }
.comentario-texto { font-size: 14px; line-height: 1.5; color: var(--text2); margin-top: 6px; max-height: 250px; overflow-y: auto; }

.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.overlay.show { display: flex; }
.spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }

.debug-box { display: none; background: var(--debug-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; margin-top: 10px; }
.debug-box.show { display: block; }

.footer { text-align: center; font-size: 12px; color: var(--text3); padding: 2rem; border-top: 1px solid var(--footer-border); margin-top: 1rem; }
.fundo-ticker { display: inline-block; background: var(--gold); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 12px; }
</style>
</head>
<body class="dark">

<div class="overlay" id="overlay">
  <div class="spin"></div>
  <div class="spin-text" id="overlayText">Processando...</div>
</div>

<header class="header">
  <div class="header-logo"><div class="dot">FII</div> Leitor de Relatórios</div>
  <div class="header-right">
    <div class="header-date" id="hDate"></div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">🔑 API GEMINI <span>Chave salva localmente</span></div>
    <div class="api-row">
      <div class="api-input-wrap">
        <input type="password" id="apiKeyInput" class="api-input" placeholder="AIza...">
        <button class="api-eye" id="apiEye">👁️</button>
      </div>
      <button class="btn btn-gold" id="btnSalvarKey">Salvar</button>
      <a href="https://aistudio.google.com/app/apikey" target="_blank" class="btn-key">Gerar Chave ↗</a>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="card">
    <div class="card-title">📄 UPLOAD PDF</div>
    <div class="upload-row">
      <label class="file-label" for="filePdf"><span id="fileName">Selecionar arquivo...</span></label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">🤖 Analisar</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <button class="btn-debug" id="btnToggleDebug" style="background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;margin-top:10px">📋 Ver Logs</button>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <div id="resultArea" class="card" style="display:none">
    <div class="card-title">📊 RESULTADOS <span id="fundoIdentificado"></span></div>
    <div id="resultadosConteudo" class="resultados-grid"></div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dbg = txt => { 
  const box = document.getElementById('debugBox');
  box.textContent += `\n[${new Date().toLocaleTimeString()}] ${txt}`;
};

const setOverlay = (show, txt) => {
  document.getElementById('overlay').classList.toggle('show', show);
  if(txt) document.getElementById('overlayText').textContent = txt;
};

// --- CACHE & HASH ---
async function getHash(file) {
  const buffer = await file.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// --- REDUÇÃO DE PAYLOAD ---
function extractSnippets(text) {
  const keywords = ['vacância', 'física', 'financeira', 'ltv', 'alavancagem', 'distribuição', 'rendimento', 'inadimplência', 'imóveis', 'inquilinos', 'gestor', 'risco'];
  const textLower = text.toLowerCase();
  const chunks = [];
  keywords.forEach(kw => {
    let idx = -1;
    while((idx = textLower.indexOf(kw, idx + 1)) !== -1) {
      chunks.push(text.substring(Math.max(0, idx - 500), Math.min(text.length, idx + 500)));
    }
  });
  return chunks.length > 0 ? chunks.join('\n[...]\n').substring(0, 30000) : text.substring(0, 30000);
}

// --- API ---
async function callGemini(text, key) {
  const prompt = `Analise este relatório de FII e retorne APENAS um JSON:
  { "ticker": "AAA", "gestora": "BBB", "vacancia_fisica": "%", "ltv": "%", "distribuicao": "R$", "principais_riscos": "item1|item2", "pontos_positivos": "item1|item2", "resumo_analista": "texto", "comentario_gestor": "texto" }
  TEXTO: ${text}`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;

  for(let i=0; i<3; i++) { // Retry automático
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      if(res.status === 429) {
        dbg(`Cota excedida (429). Tentativa ${i+1}/3. Aguardando...`);
        await new Promise(r => setTimeout(r, 5000 * (i+1)));
        continue;
      }
      if(!res.ok) throw new Error(`Erro API: ${res.status}`);
      const data = await res.json();
      return JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
    } catch(e) { if(i === 2) throw e; }
  }
}

// --- LOGICA PRINCIPAL ---
document.getElementById('btnImportar').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  const key = localStorage.getItem('gemini_api_key');
  if(!file || !key) return alert('Selecione arquivo e salve a chave!');

  setOverlay(true, 'Verificando cache...');
  const hash = await getHash(file);
  const cache = localStorage.getItem('fii_cache_' + hash);

  if(cache) {
    dbg('🚀 Resultado carregado do cache local (Cota Zero gasta)!');
    render(JSON.parse(cache));
    setOverlay(false);
    return;
  }

  setOverlay(true, 'Lendo PDF...');
  try {
    const ab = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: ab}).promise;
    let fullText = '';
    for(let i=1; i<=pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(item => item.str).join(' ') + ' ';
    }

    setOverlay(true, 'Enviando para Gemini...');
    const result = await callGemini(extractSnippets(fullText), key);
    localStorage.setItem('fii_cache_' + hash, JSON.stringify(result));
    render(result);
  } catch(e) {
    alert('Erro: ' + e.message);
  } finally {
    setOverlay(false);
  }
});

function render(d) {
  const grid = document.getElementById('resultadosConteudo');
  document.getElementById('fundoIdentificado').innerHTML = `<span class="fundo-ticker">${d.ticker}</span>`;

  let html = '';
  const fields = [
    {l: 'Vacância', v: d.vacancia_fisica},
    {l: 'LTV', v: d.ltv},
    {l: 'Distribuição', v: d.distribuicao}
  ];

  fields.forEach(f => {
    html += `<div class="result-card"><div class="result-label">${f.l}</div><div class="result-value">${f.v || 'N/A'}</div></div>`;
  });

  html += `<div class="resumo-box"><div class="resumo-texto">${d.resumo_analista}</div></div>`;
  grid.innerHTML = html;
  document.getElementById('resultArea').style.display = 'block';
}

// --- TEMA E UI ---
document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light');
  localStorage.setItem('fii_theme', document.body.classList.contains('light') ? 'light' : 'dark');
});

if(localStorage.getItem('fii_theme') === 'light') document.body.classList.add('light');

setInterval(() => {
  document.getElementById('hDate').textContent = new Date().toLocaleString();
}, 1000);

document.getElementById('btnSalvarKey').onclick = () => {
  localStorage.setItem('gemini_api_key', document.getElementById('apiKeyInput').value);
  alert('Chave Salva!');
};
</script>
</body>
</html>
